<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Essays — Samuel Salzer</title>
<meta name="description" content="Essays on sovereignty, intelligence, and the human condition.">
<meta property="og:title" content="Essays — Samuel Salzer">
<meta property="og:type" content="website">
<meta name="author" content="Samuel Salzer">
<link rel="icon" type="image/svg+xml" href="the-saddest-empires/favicon.svg">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #F0EBE3;
    --bg-subtle: #E8E1D6;
    --text: #1C1917;
    --text-secondary: #57534E;
    --text-tertiary: #A8A29E;
    --copper: #B87333;
    --copper-light: #D4A06A;
    --border: #DDD7CE;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Geist', -apple-system, sans-serif;
    font-size: 15px;
    line-height: 1.55;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1000;
    background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    opacity: 0.02;
    mix-blend-mode: multiply;
  }

  .container {
    max-width: 660px;
    margin: 0 auto;
    padding: 0 24px;
  }

  /* ===== HEADER ===== */
  header {
    padding: 80px 0 60px;
  }

  .label {
    font-family: 'Geist', monospace;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-tertiary);
    margin-bottom: 16px;
  }

  h1 {
    font-family: 'Instrument Serif', serif;
    font-size: 2.4rem;
    font-weight: 400;
    line-height: 1.15;
    color: var(--text);
    margin-bottom: 14px;
  }

  .subtitle {
    font-family: 'Geist', sans-serif;
    font-size: 14px;
    font-weight: 300;
    color: var(--text-secondary);
    line-height: 1.6;
    max-width: 480px;
  }

  .divider {
    width: 100%;
    height: 1px;
    background: var(--border);
    margin: 0;
  }

  /* ===== ESSAY LIST ===== */
  .essays {
    padding: 36px 0 80px;
  }

  .essay-link {
    display: block;
    text-decoration: none;
    color: inherit;
    padding: 28px 0;
    border-bottom: 1px solid var(--border);
    transition: all 0.2s ease;
  }

  .essay-link:first-child {
    border-top: 1px solid var(--border);
  }

  .essay-link:hover {
    padding-left: 8px;
  }

  .essay-link:hover .essay-title {
    color: var(--copper);
  }

  .essay-meta {
    font-family: 'Geist', monospace;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-tertiary);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .essay-meta .dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--copper);
    flex-shrink: 0;
  }

  .essay-title {
    font-family: 'Instrument Serif', serif;
    font-size: 1.5rem;
    font-weight: 400;
    line-height: 1.25;
    margin-bottom: 8px;
    transition: color 0.2s ease;
  }

  .essay-description {
    font-size: 13px;
    font-weight: 300;
    color: var(--text-secondary);
    line-height: 1.55;
    max-width: 520px;
  }

  /* ===== FOOTER ===== */
  footer {
    padding: 36px 0;
    border-top: 1px solid var(--border);
  }

  .footer-text {
    font-family: 'Geist', monospace;
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-tertiary);
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 480px) {
    header { padding: 52px 0 40px; }
    h1 { font-size: 1.8rem; }
    .essay-title { font-size: 1.25rem; }
    .container { padding: 0 20px; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="label">Samuel Salzer</div>
    <h1>Essays</h1>
    <p class="subtitle">On sovereignty, intelligence, and the strange weight of living alongside machines that think.</p>
  </header>

  <div class="divider"></div>

  <section class="essays">
    <a href="/the-saddest-empires/" class="essay-link">
      <div class="essay-meta">
        <span class="dot"></span>
        <span>February 2026</span>
      </div>
      <div class="essay-title">The Saddest Empires</div>
      <p class="essay-description">On sovereignty, servantdom, and the strange burden of infinite intelligence at your fingertips.</p>
    </a>
  </section>

  <footer>
    <div class="footer-text">MMXXVI</div>
  </footer>
</div>

</body>
</html>
